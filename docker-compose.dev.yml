services:
  backend:
    build: ./src/backend
    container_name: backend
    networks:
      - default
    ports:
      - "8082:8080"
    volumes:
      - ./src/backend/app:/working/app
    command: sleep infinity # python main.py

  postgres:
    image: postgres:17
    restart: always
    container_name: postgres
    shm_size: 128mb
    ports:
      - 5432:5432
    networks:
      - postgres-network
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: class
      POSTGRES_DB: test
    volumes:
      - ./src/backend/app/Chinook_PostgreSql_AutoIncrementPKs.sql:/docker-entrypoint-initdb.d/Chinook_PostgreSql_AutoIncrementPKs.sql

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 15434:8080
    networks:
      - postgres-network
    depends_on:
      - postgres

networks:
  default:
  postgres-network:
    driver: bridge
